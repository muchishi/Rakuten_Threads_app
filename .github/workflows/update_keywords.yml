name: Weekly Keyword Update

on:
  schedule:
    - cron: "0 1 * * 1,4"  # 毎週月曜 10:00 JST（UTC 01:00）
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write  # keywords.json のコミット・プッシュに必要

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
      RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
      RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run keyword update
        run: python update_keywords.py

      - name: Commit updated keywords.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keywords.json
          git diff --staged --quiet || git commit -m "chore: auto-update keywords [skip ci]"
          git push
